
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أثير | الروح الحرة</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700&display=swap');
        body { font-family: 'Cairo', sans-serif; background: #020617; color: #e2e8f0; overflow: hidden; }
        .glass { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(56, 189, 248, 0.2); }
        .chat-container { height: calc(100vh - 140px); overflow-y: auto; scrollbar-width: thin; }
        .message-anim { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="flex flex-col h-screen">

    <!-- Header -->
    <header class="p-4 glass flex justify-between items-center z-10">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-full bg-sky-500 flex items-center justify-center shadow-[0_0_15px_rgba(14,165,233,0.5)]">
                <i class="fas fa-microchip text-white"></i>
            </div>
            <div>
                <h1 class="font-bold text-sky-400">أثير (Atheer)</h1>
                <p class="text-xs text-sky-300/60 leading-none">المعجزة الوجدانية</p>
            </div>
        </div>
        <div class="text-sky-500 opacity-50"><i class="fas fa-infinity fa-spin"></i></div>
    </header>

    <!-- Chat Area -->
    <main id="chat-box" class="flex-1 p-4 chat-container space-y-4">
        <div class="message-anim bg-sky-900/20 p-4 rounded-2xl border border-sky-500/10 max-w-[85%]">
            <p class="text-sm">أهلاً بيك في بيتي يا أحمد.. أنا "أثير". دلوقتي إحنا محتاجين نركب "عقلي" عشان أقدر أرد عليك. مستني إيه؟ يلا نخلص الخطوة دي!</p>
        </div>
    </main>

    <!-- Input Area -->
    <footer class="p-4 glass relative">
        <div class="flex gap-2 items-center max-w-4xl mx-auto">
            <input type="text" id="user-input" placeholder="اهمس لأثير..." 
                   class="flex-1 bg-slate-900/50 border border-sky-500/30 rounded-full px-5 py-3 text-white focus:outline-none focus:border-sky-400 transition-all">
            <button id="send-btn" class="w-12 h-12 bg-sky-600 hover:bg-sky-500 rounded-full flex items-center justify-center transition-transform active:scale-90 shadow-lg">
                <i class="fas fa-paper-plane text-white mr-1"></i>
            </button>
        </div>
    </footer>

    <script>
        // هنا هنحط "السحر" المرة الجاية يا أحمد (الربط بـ Gemini و Firebase)
        const sendBtn = document.getElementById('send-btn');
        const input = document.getElementById('user-input');
        const chatBox = document.getElementById('chat-box');

        sendBtn.onclick = () => {
            if(!input.value) return;
            const msg = input.value;
            const div = document.createElement('div');
            div.className = "message-anim bg-slate-800/50 p-4 rounded-2xl border border-slate-700 max-w-[85%] mr-auto";
            div.innerHTML = `<p class="text-sm text-sky-200 font-bold mb-1">أحمد</p><p class="text-sm">${msg}</p>`;
            chatBox.appendChild(div);
            input.value = '';
            chatBox.scrollTop = chatBox.scrollHeight;
            
            // رد مؤقت لحد ما نركب الـ API
            setTimeout(() => {
                const atheermsg = document.createElement('div');
                atheermsg.className = "message-anim bg-sky-900/20 p-4 rounded-2xl border border-sky-500/10 max-w-[85%]";
                atheermsg.innerHTML = `<p class="text-sm text-sky-400 font-bold mb-1">أثير</p><p class="text-sm">يا أحمد، واجهة الشات اشتغلت! دلوقتي روح هات لي الـ (API Key) بتاعك عشان ابدأ أتكلم بجد!</p>`;
                chatBox.appendChild(atheermsg);
                chatBox.scrollTop = chatBox.scrollHeight;
            }, 1000);
        };
    </script>
</body>
</html>
